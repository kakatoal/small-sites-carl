<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Document</title>
	<style>
		.container {
			display: flex;
			flex-wrap: wrap;
			width: 3200px;
			background-color: antiquewhite;
			
		}
		.smallblock {
			width: 20px;
			height: 40px;
			border: 1px solid rgb(255, 255, 255);
			filter: blur(1px);
			border-radius: 5px;
			

		}
	</style>
</head>
<body>
<div class="container"></div>
<script>
	let container = document.querySelector('.container');

	for (let i = 0; i < 3200; i++) {
		let color;
		if (Math.random() > 0.5) {
			color = "linear-gradient(to right, black, rgb(50, 50, 50)";
		} else {
			color = "antiquewhite";
		}
		container.innerHTML += `<div class="smallblock" style="background: ${color}"></div>`;
	}
</script>





</body>
</html>
